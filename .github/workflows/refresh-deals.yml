name: Refresh cashback deals

on:
  schedule:
    # 20:00 UTC ≈ 6:00 AM AEST — adjust in GitHub if you prefer another time
    - cron: "0 20 * * *"
  workflow_dispatch: # lets you click "Run workflow" manually

permissions:
  contents: write

concurrency:
  group: refresh-deals
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scrape ShopBack
        run: python3 scrape_shopback.py --no-canvas --workers 12

      - name: Scrape TopCashback
        run: python3 scrape_topcashback.py --no-canvas --workers 6

      - name: Build phone dashboard
        run: python3 build_html.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update deals $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
